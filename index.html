<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naša mapa ciest</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@500;600;700&display=swap");

      :root {
        --bg-1: #fff7f6;
        --bg-2: #fef0ea;
        --panel: rgba(255, 255, 255, 0.84);
        --text: #4a2b35;
        --muted: #7a5864;
        --base-country: #f0d8d7;
        --base-border: #c9a8ab;
        --base-hover: #e7c6c5;
        --visited: #d95a73;
        --visited-hover: #c14962;
        --planned: #f2b56b;
        --planned-hover: #e39f4e;
        --accent: #7f3c56;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family: "Nunito", "Segoe UI", sans-serif;
        background:
          radial-gradient(1200px 500px at 0% 0%, #ffdede 0%, transparent 58%),
          radial-gradient(900px 450px at 100% 0%, #ffeecf 0%, transparent 54%),
          linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 100%);
      }

      .app {
        max-width: 1340px;
        margin: 0 auto;
        padding: 1rem;
      }

      .topbar {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        justify-content: space-between;
        gap: 0.9rem;
        margin-bottom: 0.85rem;
      }

      h1 {
        margin: 0;
        font-family: "Cormorant Garamond", Georgia, serif;
        font-weight: 700;
        font-size: clamp(1.6rem, 2.8vw, 2.3rem);
        letter-spacing: 0.2px;
      }

      .subtitle {
        margin: 0.15rem 0 0;
        color: var(--muted);
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
        color: var(--muted);
        font-weight: 700;
      }

      .stat {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: var(--panel);
        border: 1px solid #f0d7da;
        border-radius: 999px;
        padding: 0.35rem 0.7rem;
        box-shadow: 0 8px 20px rgba(110, 45, 69, 0.08);
      }

      .dot {
        width: 0.7rem;
        height: 0.7rem;
        border-radius: 999px;
        display: inline-block;
      }

      .dot.visited {
        background: var(--visited);
      }

      .dot.planned {
        background: var(--planned);
      }

      .dot.unmarked {
        background: var(--base-country);
        border: 1px solid var(--base-border);
      }

      .controls {
        margin-bottom: 0.55rem;
      }

      .chip {
        border: none;
        border-radius: 999px;
        background: #fff;
        color: var(--accent);
        font-weight: 700;
        padding: 0.45rem 0.85rem;
        cursor: pointer;
        box-shadow: 0 7px 16px rgba(83, 36, 54, 0.12);
      }

      .map-wrap {
        width: 100%;
        height: min(76vh, 860px);
        min-height: 450px;
        background: var(--panel);
        border: 1px solid #f0d7da;
        border-radius: 18px;
        box-shadow: 0 16px 38px rgba(89, 38, 56, 0.12);
        overflow: hidden;
        backdrop-filter: blur(4px);
      }

      #map {
        width: 100%;
        height: 100%;
        display: block;
      }

      .country {
        fill: var(--base-country);
        stroke: var(--base-border);
        stroke-width: 0.58;
        cursor: pointer;
        transition: fill 0.18s ease;
      }

      .country:hover {
        fill: var(--base-hover);
      }

      .country.status-visited {
        fill: var(--visited);
        stroke: #ac3f58;
      }

      .country.status-visited:hover {
        fill: var(--visited-hover);
      }

      .country.status-planned {
        fill: var(--planned);
        stroke: #be813a;
      }

      .country.status-planned:hover {
        fill: var(--planned-hover);
      }

      .hint {
        margin-top: 0.75rem;
        color: var(--muted);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(42, 18, 27, 0.52);
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .modal {
        width: min(440px, 100%);
        background: #fff;
        border-radius: 14px;
        padding: 1rem;
        box-shadow: 0 24px 44px rgba(0, 0, 0, 0.26);
      }

      .modal h2 {
        margin: 0;
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 1.5rem;
      }

      .modal p {
        margin: 0.35rem 0 0;
        color: var(--muted);
      }

      label {
        display: block;
        margin-top: 0.85rem;
        font-weight: 700;
      }

      select {
        width: 100%;
        margin-top: 0.35rem;
        border: 1px solid #e5c8cf;
        border-radius: 10px;
        padding: 0.55rem 0.6rem;
        font-size: 0.98rem;
        color: var(--text);
      }

      .modal-actions {
        margin-top: 1rem;
        display: flex;
        justify-content: end;
        gap: 0.55rem;
      }

      button {
        border: none;
        border-radius: 8px;
        padding: 0.55rem 0.9rem;
        font-size: 0.95rem;
        cursor: pointer;
        font-weight: 700;
      }

      button.secondary {
        background: #f2e6ea;
        color: #6f4051;
      }

      button.primary {
        background: var(--accent);
        color: #fff;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 720px) {
        .map-wrap {
          min-height: 360px;
          height: 62vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="topbar">
        <div>
          <h1>Naša spoločná mapa ciest</h1>
          <p class="subtitle">Miesta, ktoré sme spolu s Haničkou navštívili, aj tie, ktoré nás ešte čakajú.</p>
        </div>

        <div class="stats">
          <span class="stat"><span class="dot visited"></span>Navštívené: <strong id="visitedCount">0</strong></span>
          <span class="stat"><span class="dot planned"></span>V pláne: <strong id="plannedCount">0</strong></span>
          <span class="stat"><span class="dot unmarked"></span>Celkovo: <strong id="totalCount">0</strong></span>
        </div>
      </div>

      <div class="controls">
        <button id="resetZoomBtn" class="chip" type="button">Resetovať priblíženie</button>
      </div>

      <section class="map-wrap" aria-label="Mapa sveta">
        <svg id="map" role="img" aria-label="Zoomovateľná klikateľná mapa všetkých krajín sveta"></svg>
      </section>
      <p class="hint">Pohyb: podrž a ťahaj. Zoom: kolieskom myši alebo pinch na mobile. Kliknutím na krajinu nastavíš stav.</p>
    </main>

    <div id="modalBackdrop" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal">
        <h2 id="modalTitle"></h2>
        <p id="modalText"></p>

        <label for="statusSelect">Vyber stav krajiny</label>
        <select id="statusSelect">
          <option value="">Neoznačené</option>
          <option value="visited">Navštívené</option>
          <option value="planned">V pláne (blízka budúcnosť)</option>
        </select>

        <div class="modal-actions">
          <button id="cancelBtn" class="secondary" type="button">Zrušiť</button>
          <button id="confirmBtn" class="primary" type="button">Uložiť</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
